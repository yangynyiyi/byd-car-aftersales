server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
  application:
    name: byd-aftersales
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/byd_aftersales?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234
  sql:
    init:
      mode: never
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
    mongodb:
      uri: mongodb://localhost:27017/byd_car_log
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# AI Agent 配置 - 智谱 GLM
ai:
  agent:
    api-key: f1470c87b011434ab9bfcebf27cddd23.ev8t9Gh6BaJe6jYu
    base-url: https://open.bigmodel.cn/api/paas/v4
    model: GLM-4-Flash
    timeout: 30000

logging:
  level:
    com.byd.aftersales: debug
    com.byd.car: debug
